<script>
const flash = document.getElementById("flash");
const image = document.getElementById("wishImage");
const music = document.getElementById("bgMusic");

const images = [
    "ghost1.jpg",
    "ghost2.jpg",
    "ghost3.jpg",
    "ghost4.jpg",
    "ghost5.jpg",
    "ghost6.jpg",
    "ghost7.jpg",
    "ghost8.jpg",
    "ghost9.jpg"
];

/* Preload images */
images.forEach(src => {
    const img = new Image();
    img.src = src;
});

/* Simple delay helper */
function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

/* Flash for 0.7 seconds */
async function rapidFlash() {
    const duration = 700;      // total flash time (0.7 sec)
    const interval = 35;       // toggle speed (~20 flashes/sec)
    const cycles = duration / interval;

    for (let i = 0; i < cycles; i++) {
        flash.style.opacity = flash.style.opacity === "1" ? "0" : "1";
        await wait(interval);
    }

    flash.style.opacity = "0";
}

/* Main sequence */
async function sequence() {
    for (let i = 0; i < images.length; i++) {

        await rapidFlash();

        image.style.opacity = 0;
        image.src = images[i];
        await wait(20); // tiny render delay

        image.style.opacity = 1;
        await wait(500); // image visible 0.5 sec

        image.style.opacity = 0;
        await wait(50);
    }
}

window.onload = () => {
    music.play().catch(()=>{});
    sequence();
};
</script>
