<script>
const flash = document.getElementById("flash");
const image = document.getElementById("wishImage");
const music = document.getElementById("bgMusic");

const images = [
    "ghost1.jpg",
    "ghost2.jpg",
    "ghost3.jpg",
    "ghost4.jpg",
    "ghost5.jpg",
    "ghost6.jpg",
    "ghost7.jpg",
    "ghost8.jpg",
    "ghost9.jpg"
];

let current = 0;

/* Preload images */
images.forEach(src => {
    const img = new Image();
    img.src = src;
});

function rapidFlash(callback) {
    let flashes = 0;
    const totalFlashes = 10;
    const interval = 50;

    const flashInterval = setInterval(() => {
        flash.style.opacity = flash.style.opacity === "1" ? "0" : "1";
        flashes++;

        if (flashes >= totalFlashes * 2) {
            clearInterval(flashInterval);
            flash.style.opacity = "0";
            callback();
        }
    }, interval);
}

function sequence() {
    if (current >= images.length) return;

    rapidFlash(() => {
        image.style.opacity = 0; // ensure hidden first

        setTimeout(() => {
            image.src = images[current];
            image.style.opacity = 1;

            setTimeout(() => {
                image.style.opacity = 0;
                current++;
                sequence(); // call directly (no delay overlap)
            }, 800); // image visible time (faster)
        }, 50);
    });
}

window.onload = () => {
    music.play().catch(()=>{});
    sequence();
};
</script>
