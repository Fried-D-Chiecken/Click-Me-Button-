<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kill Wish</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* Flash overlay */
#flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
}

/* Fullscreen image */
#wishImage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.1s linear;
}
</style>
</head>
<body>

<div id="flash"></div>
<img id="wishImage" src="">

<audio id="bgMusic" src="Creepy Little Ghost Girl Laughing.mp3" loop></audio>

<script>
window.onload = function() {

    const flash = document.getElementById("flash");
    const image = document.getElementById("wishImage");
    const music = document.getElementById("bgMusic");

    const images = [
        "ghost1.jpg",
        "ghost2.jpg",
        "ghost3.jpg",
        "ghost4.jpg",
        "ghost5.jpg",
        "ghost6.jpg",
        "ghost7.jpg",
        "ghost8.jpg",
        "ghost9.jpg"
    ];

    let current = 0;

    function rapidFlash(callback) {
        let flashes = 0;
        const duration = 700;   // 0.7 seconds
        const interval = 35;    // toggle speed
        const maxFlashes = duration / interval;

        const flashInterval = setInterval(function() {
            flash.style.opacity = flash.style.opacity === "1" ? "0" : "1";
            flashes++;

            if (flashes >= maxFlashes) {
                clearInterval(flashInterval);
                flash.style.opacity = "0";
                callback();
            }
        }, interval);
    }

    function showNextImage() {
        if (current >= images.length) return;

        rapidFlash(function() {

            image.style.opacity = "0";
            image.src = images[current];

            setTimeout(function() {
                image.style.opacity = "1";

                setTimeout(function() {
                    image.style.opacity = "0";
                    current++;
                    showNextImage();
                }, 500); // image visible 0.5 sec

            }, 20);

        });
    }

    music.play().catch(function(){});
    showNextImage();
};
</script>

</body>
</html>
