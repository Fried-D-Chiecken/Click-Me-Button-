<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wish Reveal</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* White flash overlay */
#flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
}

/* Fullscreen image */
#wishImage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;   /* fills entire screen properly */
    opacity: 0;
    transition: opacity 0.2s ease;
}
</style>
</head>
<body>

<div id="flash"></div>
<img id="wishImage">

<audio id="bgMusic" src="Creepy Little Ghost Girl Laughing.mp3" loop></audio>

<script>
const flash = document.getElementById("flash");
const image = document.getElementById("wishImage");
const music = document.getElementById("bgMusic");

const images = [
    "ghost1.jpg",
    "ghost2.jpg",
    "ghost3.jpg",
    "ghost4.jpg",
    "ghost5.jpg",
    "ghost6.avif",
    "ghost7.webp",
    "ghost8.webp",
    "ghost9.jpg"
];

let current = 0;

/* 10 flashes in 1 second */
function rapidFlash(callback) {
    let flashes = 0;
    const totalFlashes = 10;
    const interval = 50;

    const flashInterval = setInterval(() => {
        flash.style.opacity = flash.style.opacity == 1 ? 0 : 1;
        flashes++;

        if (flashes >= totalFlashes * 2) {
            clearInterval(flashInterval);
            flash.style.opacity = 0;
            callback();
        }
    }, interval);
}

function sequence() {
    if (current >= images.length) return;

    rapidFlash(() => {
        image.src = images[current];
        image.style.opacity = 1;

        setTimeout(() => {
            image.style.opacity = 0;
            current++;
            setTimeout(sequence, 300);
        }, 1500); // image visible duration
    });
}

window.onload = () => {
    // Start music after interaction redirect
    music.play().catch(() => {});
    sequence();
};
</script>

</body>
</html>
